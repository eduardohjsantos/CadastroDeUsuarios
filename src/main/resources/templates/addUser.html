<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>

    </style>
</head>
<body>
<h1>Add new user</h1>
<div class="form-container">
    <div th:if="${message}" class="message" th:text="${message}"></div>
    <form th:action="@{/users/ui/save}" th:object="${user}" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}" required />

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required />

        <label for="jobTitle">Position:</label>
        <input type="text" id="jobTitle" th:field="*{jobTitle}" required />

        <label for="age">Age:</label>
        <input type="number" id="age" th:field="*{age}" required />

        <label for="department">Department:</label>
        <input type="text" id="department" th:field="*{department}" />

        <button type="submit">Create User</button>
    </form>
    <a th:href="@{/user/ui/list}">Return to users list</a>
</div>
</body>
</html>
